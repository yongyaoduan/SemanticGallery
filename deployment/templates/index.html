<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/app.css?v={{ static_version }}" />
  </head>
  <body>
    <main class="page">
      <form id="search-form" class="search-bar" autocomplete="off">
        <input id="image-input" type="file" accept="image/*" hidden />
        <button id="image-picker-button" type="button" aria-label="选择图片搜索">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 8h.01" />
            <path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" />
            <path d="M4 15l4 -4c.928 -.893 2.072 -.893 3 0l5 5" />
            <path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l2 2" />
          </svg>
        </button>
        <button id="selection-toggle" type="button" aria-label="批量选择图片">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 11l3 3l8 -8" />
            <path d="M20 12v7a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h9" />
          </svg>
        </button>
        <div id="image-query-chip" class="image-query-chip" hidden>
          <img id="image-query-preview" class="image-query-preview" alt="" />
          <span id="image-query-label" class="image-query-label"></span>
          <button id="image-query-clear" class="image-query-clear" type="button" aria-label="清除图片搜索">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6l-12 12" />
              <path d="M6 6l12 12" />
            </svg>
          </button>
        </div>
        <input
          id="search-input"
          type="search"
          name="q"
          placeholder="搜索本地相册"
          aria-label="搜索本地相册"
          autofocus
        />
        <label class="limit-pill" for="result-limit" aria-label="结果数量">
          <select id="result-limit" name="limit">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
        <button id="search-submit" type="submit" aria-label="搜索">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
            <path d="M21 21l-6 -6" />
          </svg>
        </button>
      </form>

      <div id="selection-bar" class="selection-bar" hidden>
        <span id="selection-count" class="selection-count">已选 0 张</span>
        <div class="selection-actions">
          <button
            id="selection-select-all"
            class="selection-icon-button"
            type="button"
            aria-label="全选当前结果"
            title="全选当前结果"
          >
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 11l3 3l8 -8" />
              <path d="M20 12v7a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h9" />
              <path d="M16 5l5 0" />
            </svg>
          </button>
          <button
            id="selection-clear"
            class="selection-icon-button"
            type="button"
            aria-label="取消选择"
            title="取消选择"
          >
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6l-12 12" />
              <path d="M6 6l12 12" />
            </svg>
          </button>
          <button
            id="selection-delete"
            class="selection-icon-button selection-delete"
            type="button"
            aria-label="删除所选图片"
            title="删除所选图片"
            disabled
          >
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7l16 0" />
              <path d="M10 11l0 6" />
              <path d="M14 11l0 6" />
              <path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
              <path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
            </svg>
          </button>
        </div>
      </div>

      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <div id="lightbox" class="lightbox" hidden>
      <div class="lightbox-panel">
        <button id="lightbox-close" class="lightbox-close" type="button" aria-label="关闭">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6l-12 12" />
            <path d="M6 6l12 12" />
          </svg>
        </button>
        <button
          id="lightbox-info-toggle"
          class="lightbox-info-toggle"
          type="button"
          aria-label="查看图片信息"
          aria-expanded="false"
        >
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
            <path d="M12 9h.01" />
            <path d="M11 12h1v4h1" />
          </svg>
        </button>
        <button id="lightbox-delete" class="lightbox-delete" type="button" aria-label="删除图片">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7l16 0" />
            <path d="M10 11l0 6" />
            <path d="M14 11l0 6" />
            <path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
            <path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
          </svg>
        </button>
        <button id="lightbox-similar" class="lightbox-similar" type="button" aria-label="搜索相似图片">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7a2 2 0 0 1 2 -2h7a2 2 0 0 1 2 2v7a2 2 0 0 1 -2 2h-7a2 2 0 0 1 -2 -2z" />
            <path d="M9 10a1.5 1.5 0 1 0 0 -3a1.5 1.5 0 0 0 0 3z" />
            <path d="M4 12l3 -3l4 4" />
            <path d="M15.5 15.5l4.5 4.5" />
            <path d="M17.5 11.5a3 3 0 1 0 0 6a3 3 0 0 0 0 -6z" />
          </svg>
        </button>
        <img id="lightbox-image" alt="" />
        <div id="lightbox-meta" class="lightbox-meta" hidden>
          <div class="meta-row">
            <span class="meta-label">文件名</span>
            <span id="lightbox-filename" class="meta-value"></span>
          </div>
          <div class="meta-row">
            <span class="meta-label">路径</span>
            <span id="lightbox-path" class="meta-value"></span>
          </div>
          <div class="meta-row">
            <span id="lightbox-time-label" class="meta-label">时间</span>
            <span id="lightbox-time" class="meta-value"></span>
          </div>
        </div>
      </div>
    </div>

    <template id="card-template">
      <button class="result-card" type="button">
        <span class="selection-indicator" aria-hidden="true">
          <svg class="selection-indicator-icon" viewBox="0 0 24 24">
            <path d="M5 12l5 5l9 -9" />
          </svg>
        </span>
        <img class="result-thumb" loading="lazy" alt="" />
      </button>
    </template>

    <script src="/static/app.js?v={{ static_version }}" defer></script>
  </body>
</html>
